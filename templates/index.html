<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backend ReadmeLab</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: #f5f7fb;
        color: #1f2a44;
      }
      .card {
        max-width: 720px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #e3e9f6;
        border-radius: 12px;
        padding: 24px 28px;
        box-shadow: 0 8px 20px rgba(12, 25, 66, 0.08);
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 8px 0; line-height: 1.5; }
      code {
        background: #f0f4ff;
        padding: 2px 6px;
        border-radius: 6px;
      }
      a { color: #1d4ed8; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Backend ReadmeLab</h1>
      <p>The API service is running.</p>
      <p>Health check: <code>/api/health</code></p>
      <p>Chat endpoint: <code>/chat</code></p>
      <p>Download endpoint: <code>/download</code></p>
    </div>
  </body>
</html>
